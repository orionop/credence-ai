<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CredenceAI — Institutional Credit Decisioning</title>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@600;700&family=Noto+Serif:wght@400;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#c5a981",
            "background-light": "#f7f7f6",
            "background-dark": "#1d1a15",
            "surface-dark": "#161b22",
            "memo-paper": "#fafaf8",
            "risk-high": "#dc2626",
            "risk-warn": "#f59e0b",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"],
            "serif": ["Playfair Display", "Noto Serif", "Lora", "serif"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .serif-heading {
      font-family: 'Playfair Display', serif;
    }

    .memo-shadow {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #3e372e;
      border-radius: 10px;
    }

    .graph-glow-amber {
      filter: drop-shadow(0 0 8px rgba(245, 158, 11, 0.6));
    }

    .graph-glow-crimson {
      filter: drop-shadow(0 0 12px rgba(220, 38, 38, 0.8));
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
